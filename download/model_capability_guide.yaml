# Model Capability Guide
# ITEM-012: Tier classification with capability parameters

capability_tiers:
  TIER_1_FLAGSHIP:
    context: "100K+"
    instructions: "Complex nested"
    cot: "Full 4-step"
    consistency: ">90% over 50+ turns"
    recommended_config: "Full SPINE, Full Anchors, CoT Tier 3"
    examples:
      - "Claude 4 Sonnet/Opus"
      - "GPT-4o"
      - "Gemini 2.5 Pro"
      
  TIER_2_EFFICIENT:
    context: "32K-100K"
    instructions: "Multi-step"
    cot: "3-step"
    consistency: "75-90% over 30+ turns"
    recommended_config: "Full SPINE, Enneagram+OCEAN Anchors, CoT Tier 2"
    examples:
      - "Llama 3 70B"
      - "Qwen 2.5 32B/72B"
      - "Mixtral 8x7B"
      
  TIER_3_LIGHTWEIGHT:
    context: "8K-32K"
    instructions: "Simple"
    cot: "2-step"
    consistency: "60-75% over 20+ turns"
    recommended_config: "Core 4 SPINE, No Anchors, CoT Tier 1"
    examples:
      - "Qwen 2.5 14B"
      - "Gemma 3 12B"
      - "Llama 4 Scout 17B"
      
  TIER_4_EDGE:
    context: "<8K"
    instructions: "Single-task"
    cot: "No CoT"
    consistency: "<60% over 10+ turns"
    recommended_config: "Use pre-generated fallback_4k from Tier 1/2"
    examples:
      - "Legacy models with limited context"
      - "Quantized models under 8B parameters"

