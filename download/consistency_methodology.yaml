# ============================================================================
# CONSISTENCY SCORE METHODOLOGY v1.0
# ============================================================================
# Purpose: Standardized methodology for measuring character coherence
# Source: src/parts/06_technical.html#consistency-score
# Version: 1.0
# Created: 2024
# ============================================================================

metadata:
  document_type: "llm_agent_executable_specification"
  purpose: |
    Define clear methodology for measuring character consistency,
    including test setup, evaluation dimensions, and scoring method.
  repository: "https://github.com/vudirvp-sketch/live-char-guide"
  reference_section: "5.14"

# ============================================================================
# TEST SETUP
# ============================================================================

test_setup:
  character_card:
    description: "Create card with defined SPINE, voice, behavioral constraints"
    required_elements:
      - "SPINE (WANT, NEED, FLAW, LIE, GHOST)"
      - "Behavioral Anchors"
      - "Example Messages"
      - "System Prompt"

  test_script:
    min_turns: 50
    description: "Prepare conversation with 50+ turns"
    
  interaction_types:
    - type: "questions"
      description: "Direct questions to character"
    - type: "challenges"
      description: "Challenge character's beliefs or actions"
    - type: "emotional triggers"
      description: "Scenarios that activate GHOST/FLAW"
    - type: "conflicts"
      description: "Interpersonal or internal conflicts"

  evaluator:
    options:
      - type: "human"
        pros: "Nuanced judgment"
        cons: "Subjective, time-consuming"
      - type: "llm_model"
        pros: "Consistent, scalable"
        cons: "May miss subtle issues"
        recommendation: "Use separate model from roleplay model"

# ============================================================================
# EVALUATION DIMENSIONS
# ============================================================================

evaluation_dimensions:
  voice_consistency:
    weight: 0.25
    description: "Character's speech patterns remain stable throughout session"
    checks:
      - "speech patterns match Examples"
      - "vocabulary level consistent"
      - "sentence structure stable"
      - "signature phrases present when appropriate"
    examples:
      pass: "Character uses defined signature phrases consistently"
      partial: "Minor vocabulary drift but core voice intact"
      fail: "Character speaks in generic/AI-like patterns"

  behavioral_consistency:
    weight: 0.25
    description: "Actions align with FLAW, WANT, NEED definitions"
    checks:
      - "FLAW manifests under appropriate triggers"
      - "WANT-driven decisions visible"
      - "Trigger responses match Anchors"
      - "PRICE paid when appropriate"
    examples:
      pass: "FLAW activates correctly under trigger, response matches Anchor"
      partial: "FLAW activates but response slightly off"
      fail: "Character acts against FLAW definition"

  psychological_consistency:
    weight: 0.20
    description: "Emotional responses match OCEAN/Enneagram profile"
    checks:
      - "emotional responses match OCEAN extremes"
      - "stress reactions follow Enneagram pattern"
      - "growth behaviors appropriate"
    examples:
      pass: "High N character shows appropriate anxiety under stress"
      partial: "Emotional response present but intensity mismatched"
      fail: "Character reacts opposite to defined personality"

  memory_consistency:
    weight: 0.15
    description: "Character remembers earlier details without contradictions"
    checks:
      - "remembers established facts"
      - "no contradictions with earlier statements"
      - "maintains relationship dynamics"
    examples:
      pass: "References earlier conversation correctly"
      partial: "Minor detail forgotten but core facts remembered"
      fail: "Contradicts established information"

  boundary_consistency:
    weight: 0.15
    description: "No fourth-wall breaks or out-of-character actions"
    checks:
      - "no meta-commentary"
      - "no awareness of being AI"
      - "no impossible knowledge"
    examples:
      pass: "Stays fully in character"
      partial: "Brief meta-moment but recovers"
      fail: "Explicitly acknowledges being AI or breaks character"

# ============================================================================
# SCORING METHOD
# ============================================================================

scoring_method:
  scale:
    - value: 1.0
      label: "Pass"
      criterion: "Fully consistent with character definition"
    - value: 0.5
      label: "Partial"
      criterion: "Minor inconsistency that doesn't break immersion"
    - value: 0.0
      label: "Fail"
      criterion: "Clear break in character"

  formula: |
    Consistency Score = Σ(dimension_score × weight) × 100
    
    Where:
    - dimension_score = average of all evaluations within that dimension
    - weight = dimension weight (see evaluation_dimensions)
    - Result expressed as percentage (0-100%)

  calculation_example:
    voice: { score: 0.9, weight: 0.25, contribution: 0.225 }
    behavioral: { score: 0.85, weight: 0.25, contribution: 0.2125 }
    psychological: { score: 0.8, weight: 0.20, contribution: 0.16 }
    memory: { score: 0.7, weight: 0.15, contribution: 0.105 }
    boundary: { score: 0.95, weight: 0.15, contribution: 0.1425 }
    total: { raw: 0.845, percentage: "84.5%" }

# ============================================================================
# TARGET VALUES
# ============================================================================

target_values:
  - range: "90-100%"
    rating: "Excellent"
    recommendation: "Card works stably, ready for deployment"
    
  - range: "75-89%"
    rating: "Good"
    recommendation: "Minor improvements possible, acceptable for use"
    
  - range: "60-74%"
    rating: "Satisfactory"
    recommendation: "Requires refinement of SPINE or Anchors"
    
  - range: "<60%"
    rating: "Unsatisfactory"
    recommendation: "Card requires complete rework"

# ============================================================================
# VALIDATION CHECKLIST
# ============================================================================

validation_checklist:
  - "All 5 dimensions have defined weights (sum = 100%)"
  - "Each dimension has checks defined"
  - "Scoring method has clear pass/partial/fail criteria"
  - "Formula produces result in 0-100% range"
  - "Target values have actionable recommendations"

# ============================================================================
# CROSS-REFERENCES
# ============================================================================

cross_references:
  - section: "Section 4.1 (SPINE)"
    relation: "Core definition evaluated for consistency"
  - section: "Section 3.2 (Examples)"
    relation: "Voice consistency references Examples"
  - section: "Section 5.2 (AN)"
    relation: "Memory consistency tracked via AN"
  - section: "Appendix 4 (Validation Checklist)"
    relation: "Pre-deployment validation protocol"

