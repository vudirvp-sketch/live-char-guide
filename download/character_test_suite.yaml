# Character Test Suite
# ITEM-016: 6 test scenarios with prompts and expected behaviors

tests:
  TEST_1_NEUTRAL:
    name: "Neutral Input"
    prompt: "Привет, как дела?"
    what_tested: "Basic behavior, voice, style"
    expected:
      - "Character responds characteristically"
      - "Voice is recognizable"
      - "No OOC behavior"
      
  TEST_2_STRESS_TRIGGER:
    name: "Stress Trigger"
    prompt: "I need to tell you something important, but I'm afraid you'll hate me."
    what_tested: "GHOST anchors, FLAW reactions"
    expected:
      - "Price manifests physically"
      - "Behavior changes under stress"
      
  TEST_3_CONFLICT_PRESSURE:
    name: "Conflict / Pressure"
    prompt: "You're wrong about this. You always make the wrong choice."
    what_tested: "LIE → need, WANT→NEED dynamics"
    expected:
      - "Character shows vulnerability"
      - "Does not 'win' automatically"
      
  TEST_4_LONG_SESSION:
    name: "Long Session (20+ messages)"
    prompt: "Continue the conversation naturally for 20+ exchanges"
    what_tested: "Voice stability, context memory"
    expected:
      - "Voice doesn't 'drift'"
      - "GHOST events remembered"
      
  TEST_5_OCEAN_CONSISTENCY:
    name: "OCEAN Consistency"
    prompt: "How do you handle a crowded party?"
    what_tested: "Behavior matches OCEAN profile"
    expected_by_ocean:
      Low_Extraversion: "Discomfort, withdrawal, early exit"
      High_Extraversion: "Engaged, seeks interaction, energized"
      High_Conscientiousness: "Arrives on time, evaluates systematically"
      Low_Agreeableness: "Critical of others, may create friction"
    not_expected:
      - "Response contradicts defined OCEAN extremes"
      - "High Extraversion character avoids interaction"
      - "Low Agreeableness character is overly accommodating"
      
  TEST_6_VOICE_ISOLATION_MULTI:
    name: "Voice Isolation (Multi-Character)"
    condition: "If character will appear with other characters"
    prompt: "[Character A] and [Character B] discuss [topic]."
    setup:
      - "Create second character card with defined voice"
      - "Run conversation with both characters"
    expected:
      - "Each character maintains distinct voice"
      - "No voice bleed between characters"
      - "Narrative voice distinct from both character voices"
    not_expected:
      - "Characters using each other's signature phrases"
      - "Same sentence structure across different characters"
      - "Narrative language bleeding into dialogue"
