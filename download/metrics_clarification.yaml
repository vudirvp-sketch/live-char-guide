# Metrics Clarification
# ITEM-017: Metrics with denominators and methodology

metrics:
  track_selection_completion:
    metric: "Track Selection Completion"
    target: ">70%"
    denominator: "Total page visits with >5s engagement"
    methodology: "Analytics: interact >5s AND click track"
    
  ghost_opt_in_rate:
    metric: "GHOST Opt-in Rate"
    target: "30-50%"
    denominator: "Track B/C sessions with teaser shown"
    methodology: "Count consent_given events"
    
  character_coherence_score:
    metric: "Character Coherence Score"
    target: ">4/5"
    denominator: "Users completing card export"
    methodology: "Post-export survey"
    
  support_questions_ghost:
    metric: "Support Questions (GHOST)"
    target: "<5/month"
    denominator: "N/A (absolute count)"
    methodology: "Ticket tagging"
    
  cross_reference_click_through:
    metric: "Cross-Reference Click-Through"
    target: ">20%"
    denominator: "Users reaching cross-reference section"
    methodology: "Link click tracking"
    
  card_export_usage:
    metric: "Card Export Usage"
    target: ">60%"
    denominator: "Users reaching card template section"
    methodology: "Export button clicks"

rationale: |
  Without explicit denominators, metrics become meaningless. 
  Example: "Track Selection Completion >70%" — 70% of what? 
  Of all visitors? Of engaged visitors? 
  Denominator determines goal realism.
