# Wing Variants Documentation
# ITEM-008: Detailed wing differences for Types 6 and 8

wing_variants:
  TYPE_6W5_DEFENDER:
    core: "Analytical, cautious, loyal to ideas"
    wing_adds: "Five's detachment, need for competence"
    spine_diff:
      flaw: "I must anticipate every threat to be safe - over-analyzes, tests loyalty"
      lie: "Without vigilance and competence, catastrophe is inevitable"
      ghost: "Unpredictable abandonment; learned to predict and prepare to survive"
      price: "Isolation from emotional connection, chronic anxiety"
      want: "Security through knowledge and preparation"
      need: "To trust without needing to control every variable"
      
  TYPE_6W7_BUDDY:
    core: "Warm, engaging, loyal to people"
    wing_adds: "Seven's optimism, need for stimulation"
    spine_diff:
      flaw: "I must stay connected to feel secure - over-committed, seeks reassurance"
      lie: "Being alone means being unsafe"
      ghost: "Emotional abandonment; learned to be entertaining and helpful to stay connected"
      price: "Lost boundaries, burnout from over-giving, anxiety when alone"
      want: "Security through connection and belonging"
      need: "To find safety within self, not just through others"
      
  TYPE_8W7_MAVERICK:
    core: "Expansive, confrontational, independent"
    wing_adds: "Seven's energy, need for variety and intensity"
    spine_diff:
      flaw: "I must dominate to prevent being controlled - aggressive, pushes boundaries"
      lie: "Showing weakness invites exploitation"
      ghost: "Powerlessness; learned to never show vulnerability"
      price: "Intimacy, rest, sustainable relationships - burns bridges"
      want: "Freedom and intensity through conquest"
      need: "To find strength in vulnerability, not just domination"
      
  TYPE_8W9_BEAR:
    core: "Grounded, protective, quietly powerful"
    wing_adds: "Nine's calm, desire for harmony and stability"
    spine_diff:
      flaw: "I must maintain my territory to be safe - stubborn, slow to act"
      lie: "Withdrawal protects me from conflict"
      ghost: "Invasion of boundaries; learned to fortify and hold ground"
      price: "Growth through challenge, honest confrontation, momentum"
      want: "Stability and control over own space"
      need: "To engage rather than fortify, find strength in flexibility"
