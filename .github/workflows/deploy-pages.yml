name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'assets/**'
      - 'build/**'
      - 'data/**'
      - 'docs/**'
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'index.html'
      - 'layer-config.json'
      - 'eslint.config.js'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all artifacts (shell architecture)
        run: pnpm run build:all

      - name: Validate artifacts
        run: pnpm run validate

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            dist/
          retention-days: 5

  # Quality gate job
  quality:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: build-output
          path: dist

      - name: Start server for quality checks
        run: |
          pnpm exec serve dist -l 3000 &
          npx wait-on http://localhost:3000/ --timeout 60000

      - name: Lighthouse CI
        run: npx lhci autorun --config=.lighthouserc.json

      - name: Full-Page Accessibility Audit
        continue-on-error: true
        run: |
          npx @axe-core/cli http://localhost:3000/ --load-delay=2000 --exit || echo "Axe audit completed with warnings"

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: build-output
          path: dist

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Smoke Test
        run: |
          PAGE_URL="${{ steps.deployment.outputs.page_url }}"
          curl -s "$PAGE_URL" | grep -q "shell-styles.css" || echo "WARN: shell not found"
          curl -s "$PAGE_URL/assets/lazy-loader.js" | head -1 | grep -q "LAZY LOADER" || echo "WARN: lazy-loader not found"
          curl -s "$PAGE_URL/parts-l2/01_intro.html" | grep -q "intro" || echo "WARN: parts-l2 not found"

      - name: Create Deploy Tag
        if: success()
        run: |
          TAG="deploy-$(date +%Y%m%d-%H%M%S)"
          git tag $TAG
          git push origin $TAG
