name: Build and Commit Artifacts

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - '.github/workflows/build-artifact.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all artifacts
        run: pnpm run build:all

      - name: Validate artifacts
        run: pnpm run validate

      - name: Check version sync
        # Pre-release versions may fail version check
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        run: pnpm run version:check

      - name: Run tests
        # Tests may be incomplete during migration
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        run: pnpm test

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            index.html
            live-char-guide-zero-install.html
            404.html
            assets/
            build.hash
            build-zero-install.hash
          retention-days: 5

  pr-comment:
    name: PR Build Info
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get artifact sizes
        id: sizes
        run: |
          INDEX_SIZE=$(stat -c%s "index.html" 2>/dev/null || echo "0")
          ZERO_SIZE=$(stat -c%s "live-char-guide-zero-install.html" 2>/dev/null || echo "0")
          echo "index_size=$((INDEX_SIZE / 1024))" >> $GITHUB_OUTPUT
          echo "zero_size=$((ZERO_SIZE / 1024))" >> $GITHUB_OUTPUT

      - name: Get version info
        id: version
        run: |
          VERSION=$(cat src/VERSION 2>/dev/null || echo "unknown")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Comment on PR
        uses: actions/github-script@v8
        with:
          script: |
            const indexSize = '${{ steps.sizes.outputs.index_size }}';
            const zeroSize = '${{ steps.sizes.outputs.zero_size }}';
            const version = '${{ steps.version.outputs.version }}';

            const body = `## Build Summary

            | Artifact | Size |
            |----------|------|
            | \`index.html\` | ${indexSize} KB |
            | \`live-char-guide-zero-install.html\` | ${zeroSize} KB |

            **Version:** ${version}

            Build and validation completed successfully.

            > These artifacts will be deployed to GitHub Pages when this PR is merged to \`main\`.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
