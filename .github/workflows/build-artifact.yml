name: Build and Commit Artifacts

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
  workflow_dispatch:

jobs:
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all artifacts
        run: npm run build:all

      - name: Validate artifacts
        run: npm run validate

      - name: Check version sync
        run: npm run version:check || true
        continue-on-error: true

      - name: Commit changes (main branch only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(artifact): auto-regenerate HTML files [skip ci]"
          file_pattern: "index.html live-char-guide-zero-install.html build.hash build-zero-install.hash"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          skip_fetch: true
          skip_checkout: true

      - name: Report PR status
        if: github.event_name == 'pull_request'
        run: |
          echo "::notice::Build completed successfully. Artifacts would be regenerated on merge."

  # Optional: PR comment with build info
  pr-comment:
    name: PR Build Info
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get artifact sizes
        id: sizes
        run: |
          INDEX_SIZE=$(stat -c%s "index.html" 2>/dev/null || echo "0")
          ZERO_SIZE=$(stat -c%s "live-char-guide-zero-install.html" 2>/dev/null || echo "0")
          echo "index_size=$((INDEX_SIZE / 1024))" >> $GITHUB_OUTPUT
          echo "zero_size=$((ZERO_SIZE / 1024))" >> $GITHUB_OUTPUT

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const indexSize = '${{ steps.sizes.outputs.index_size }}';
            const zeroSize = '${{ steps.sizes.outputs.zero_size }}';

            const body = `## 🏗️ Build Summary

            | Artifact | Size |
            |----------|------|
            | \`index.html\` | ${indexSize} KB |
            | \`live-char-guide-zero-install.html\` | ${zeroSize} KB |

            ✅ Build completed successfully.

            > These artifacts will be auto-committed when this PR is merged to \`main\`.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
