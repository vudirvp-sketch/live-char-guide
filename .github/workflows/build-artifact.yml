name: Build and Commit Artifacts

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'assets/**'
      - 'build/**'
      - 'data/**'
      - 'docs/**'
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'index.html'
      - 'layer-config.json'
      - 'eslint.config.js'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'assets/**'
      - 'build/**'
      - 'data/**'
      - 'docs/**'
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'index.html'
      - 'layer-config.json'
      - 'eslint.config.js'
  workflow_dispatch:

jobs:
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all artifacts (shell architecture)
        run: pnpm run build:all

      - name: Validate artifacts
        run: pnpm run validate

      - name: Check version sync
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        run: pnpm run version:check

      - name: Run tests
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        run: pnpm test

      # === ID: F1 | CI Duplicate Detection ===
      - name: Check for duplicates
        run: |
          python scripts/check_duplicates.py --min-length 100 --threshold 0.9
        continue-on-error: ${{ github.event_name == 'pull_request' }}

      # === ID: F2 | CI Terminology Validation ===
      - name: Validate terminology
        run: |
          python scripts/validate_terms.py --glossary src/data/glossary.json
        continue-on-error: ${{ github.event_name == 'pull_request' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            dist/
            index.html
            build.hash
            assets/
          retention-days: 5

  pr-comment:
    name: PR Build Info
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get artifact sizes
        id: sizes
        run: |
          INDEX_SIZE=$(stat -c%s "dist/index.html" 2>/dev/null || stat -c%s "index.html" 2>/dev/null || echo "0")
          echo "index_size=$((INDEX_SIZE / 1024))" >> $GITHUB_OUTPUT

      - name: Get version info
        id: version
        run: |
          VERSION=$(cat src/VERSION 2>/dev/null || echo "unknown")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Comment on PR
        uses: actions/github-script@v8
        with:
          script: |
            const indexSize = '${{ steps.sizes.outputs.index_size }}';
            const version = '${{ steps.version.outputs.version }}';

            const body = `## Build Summary (Shell Architecture)

            | Artifact | Size |
            |----------|------|
            | \`dist/index.html\` | ${indexSize} KB |

            **Version:** ${version}

            Build and validation completed successfully.

            > Shell architecture with lazy-loading parts-l{1,2,3}.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
