name: Validate Track System

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Validate downward links
        run: |
          echo "=== PHASE 1.4: Downward Link Validation ==="
          echo "WARN: validate_downward_links.py not available, skipping"
      
      - name: Validate terminology (all layers)
        run: |
          echo "=== Terminology Validation ==="
          python scripts/validate_terms.py --glossary data/glossary.json
      
      - name: Check for duplicates (all layers)
        run: |
          echo "=== Duplicate Detection ==="
          python scripts/check_duplicates.py --min-length 100 --threshold 0.9
