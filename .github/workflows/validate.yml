name: Validate Track System

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Validate downward links
        run: |
          echo "=== PHASE 1.4: Downward Link Validation ==="
          python scripts/validate_downward_links.py --verbose
      
      - name: Validate track attributes
        run: |
          echo "=== Track Attribute Validation ==="
          python scripts/validate_terms.py || echo "validate_terms.py not found, skipping"
