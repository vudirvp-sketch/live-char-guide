<!DOCTYPE html>
<!-- Live Character Guide - Shell v5.12.0 -->
<!-- Minimal shell that lazy-loads layer content -->
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="livechar-version" content="5.12.0">
  <meta name="description" content="Engineering pipeline for RP character cards: Spine to deploy. For 12B–32B+ models.">
  <meta property="og:title" content="Live Character for LLM — Guide">
  <meta property="og:description" content="Engineering pipeline for RP character cards: Spine to deploy. For 12B–32B+ models.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="assets/preview-card.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/favicon.svg">
  <title>Live Character for LLM — Guide</title>
  <link rel="stylesheet" href="assets/shell-styles.css">
</head>
<body data-layer="">
  <!-- Loading overlay -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Загрузка...</div>
  </div>

  <!-- Layer selector modal (shown on first visit) -->
  <div id="layer-modal" class="layer-modal">
    <div class="layer-modal-content">
      <h1 class="modal-title">🧠 Live Character Guide</h1>
      <p class="modal-subtitle">Выберите уровень сложности</p>
      
      <div class="layer-cards">
        <button class="layer-card-btn" data-layer="1">
          <span class="layer-icon">🟢</span>
          <span class="layer-title">Layer 1</span>
          <span class="layer-subtitle">Базовый</span>
          <span class="layer-time">~15 мин</span>
          <span class="layer-desc">Для новичков. Создание простой карточки с основными элементами.</span>
        </button>
        
        <button class="layer-card-btn" data-layer="2">
          <span class="layer-icon">🔵</span>
          <span class="layer-title">Layer 2</span>
          <span class="layer-subtitle">Продвинутый</span>
          <span class="layer-time">~30 мин</span>
          <span class="layer-desc">Для практиков. Полный пайплайн с SPINE и техническими настройками.</span>
          <span class="layer-badge recommended">Рекомендуется</span>
        </button>
        
        <button class="layer-card-btn" data-layer="3">
          <span class="layer-icon">🟣</span>
          <span class="layer-title">Layer 3</span>
          <span class="layer-subtitle">Эксперт</span>
          <span class="layer-time">~60 мин</span>
          <span class="layer-desc">Для экспертов. Все возможности, включая продвинутые техники.</span>
        </button>
      </div>
      
      <div class="layer-footer">
        <p>Слой можно переключить в любой момент</p>
      </div>
    </div>
  </div>

  <!-- Main content area (hidden until layer selected) -->
  <main id="content" class="content-hidden"></main>

  <!-- Layer switcher (visible after layer selected) -->
  <div id="layer-switcher" class="layer-switcher hidden">
    <button class="layer-switch-btn" data-layer="1" title="Layer 1: Базовый">
      <span class="switch-icon">🟢</span>
      <span class="switch-label">L1</span>
    </button>
    <button class="layer-switch-btn" data-layer="2" title="Layer 2: Продвинутый">
      <span class="switch-icon">🔵</span>
      <span class="switch-label">L2</span>
    </button>
    <button class="layer-switch-btn" data-layer="3" title="Layer 3: Эксперт">
      <span class="switch-icon">🟣</span>
      <span class="switch-label">L3</span>
    </button>
  </div>

  <!-- FAB buttons (theme, TOC, etc.) -->
  <div class="fab-group" id="fab-group" style="display: none;">
    <button class="fab-btn" id="fab-toc" title="Содержание" aria-label="Открыть содержание">
      📑
    </button>
    <button class="fab-btn" id="fab-theme" title="Тема" aria-label="Переключить тему">
      <span class="theme-icon-dark">🌙</span>
      <span class="theme-icon-light" hidden>☀️</span>
      <span class="theme-icon-oled" hidden>⬛</span>
    </button>
  </div>

  <!-- TOC Panel -->
  <div id="toc-panel" class="panel" role="dialog" aria-label="Содержание">
    <div class="panel-header" data-drag-handle>
      <span class="panel-header-title">📑 Содержание</span>
      <div class="panel-header-actions">
        <button class="panel-btn" data-action="close" title="Закрыть" aria-label="Закрыть">✕</button>
      </div>
    </div>
    <div class="panel-content" id="toc-content"></div>
  </div>

  <script src="assets/lazy-loader.js"></script>
</body>
</html>
